spring.application.name=asteroidalerting

nasa.neo.api.url=https://api.nasa.gov/neo/rest/v1/feed
nasa.api.key=DEMO_KEY

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.template.default-topic=asteroid-alert
spring.kafka.producer.key-serialize=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serialize=org.springframework.kafka.support.serializer.JsonSerializer