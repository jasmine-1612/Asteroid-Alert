spring.application.name=notificationservice
server.port=8081

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/asteroid_alerting
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

#MailTrap
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=f6e13e90e39ae9
spring.mail.password=6368209aeef257
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

email.service.from.email=whocares12011@gmail.com

# Kafka consumer config
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Wrap JsonDeserializer in ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# Delegate to JsonDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Provide default class for JSON deserialization
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.asteroidalerting.event.AsteroidCollisionEvent

# Trust your package
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.asteroidalerting.event

# Optional if producer doesn't send type headers
spring.kafka.consumer.properties.spring.json.use.type.headers=false
